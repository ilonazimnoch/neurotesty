<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Zagadnienie 11 — Opioidy i kryzys opioidowy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }
    p {
      margin-top: 0;
      line-height: 1.6;
    }
    .question {
      margin-bottom: 24px;
      padding: 16px 20px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .question-title {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .answers {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background-color 0.15s ease;
    }
    label:hover {
      background-color: #e5f3ef;
    }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #0f766e;
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(15, 118, 110, 0.35);
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    .submit-btn:hover {
      background-color: #115e59;
      box-shadow: 0 12px 28px rgba(17, 94, 89, 0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Zagadnienie 11 — Opioidy i kryzys opioidowy</h1>
      <p>Test jednokrotnego wyboru. Na końcu zobaczysz liczbę poprawnych odpowiedzi i wynik procentowy.</p>
      <p>Odpowiedzi są pomieszane względem kolejności w pliku źródłowym.</p>
    </div>

    <form id="quizForm" class="card">
      <div id="questionsContainer"></div>

      <button type="submit" class="submit-btn">Zakończ test</button>
      <div id="result" class="result"></div>
    </form>
  </div>

  <script>
    const questions = [
      {
        question: "Opioidy to:",
        answers: [
          "Wyłącznie syntetyczne substancje przeciwbólowe",
          "Substancje działające na receptory opioidowe, obejmujące opioidy endogenne i egzogenne",
          "Tylko endogenne peptydy w mózgu",
          "Tylko leki przeciwpsychotyczne"
        ],
        correct: 1
      },
      {
        question: "Klasycznym naturalnym opioidowym lekiem przeciwbólowym pozyskiwanym z maku lekarskiego jest:",
        answers: [
          "Kokaina",
          "Morfina",
          "Amfetamina",
          "LSD"
        ],
        correct: 1
      },
      {
        question: "Heroina jest:",
        answers: [
          "Syntetyczną pochodną morfiny o silniejszym działaniu",
          "Naturalnym neuropeptydem",
          "Antagonistą receptorów opioidowych",
          "Leki em przeciwpsychotycznym"
        ],
        correct: 0
      },
      {
        question: "Kodeina jest stosowana klinicznie m.in. jako składnik leków:",
        answers: [
          "Przeciwpsychotycznych",
          "Przeciwkaszlowych",
          "Przeciwpadaczkowych",
          "Przeciwlękowych"
        ],
        correct: 1
      },
      {
        question: "Receptory opioidowe są szczególnie licznie zlokalizowane w:",
        answers: [
          "Układzie limbicznym i podwzgórzu",
          "Rdzeniu kręgowym wyłącznie",
          "Móżdżku wyłącznie",
          "Ciele migdałowatym wyłącznie"
        ],
        correct: 0
      },
      {
        question: "Endogenne opioidy (np. endorfiny) pełnią funkcję:",
        answers: [
          "Zwiększania odczuwania bólu",
          "Redukcji bólu i generowania doznań przyjemnościowych",
          "Wyłącznie regulacji rytmu serca",
          "Zwiększania ciśnienia krwi"
        ],
        correct: 1
      },
      {
        question: "Działanie przeciwbólowe opioidów wynika głównie z:",
        answers: [
          "Zwiększenia uwalniania glutaminianu",
          "Aktywacji receptorów opioidowych i hamowania przewodzenia bodźców bólowych",
          "Blokady receptorów GABA",
          "Zwiększenia przewodnictwa dopaminergicznego w istocie czarnej"
        ],
        correct: 1
      },
      {
        question: "Opioidy wpływają na układ nagrody m.in. poprzez:",
        answers: [
          "Zmniejszanie uwalniania dopaminy w jądrze półleżącym",
          "Zwiększanie uwalniania dopaminy w jądrze półleżącym i innych strukturach układu limbicznego",
          "Zablokowanie aktywności jąder podstawy",
          "Wyłącznie hamowanie kory przedczołowej"
        ],
        correct: 1
      },
      {
        question: "Oksykodon i fentanyl to przykłady:",
        answers: [
          "Benzodiazepin",
          "Syntetycznych lub półsyntetycznych opioidów przepisywanych jako silne leki przeciwbólowe",
          "Neuroleptyków II generacji",
          "SSRI"
        ],
        correct: 1
      },
      {
        question: "Fentanyl w porównaniu z morfiną jest:",
        answers: [
          "O wiele słabszy",
          "Podobny pod względem siły działania",
          "Wielokrotnie silniejszy (bardziej potentny)",
          "Pozbawiony ryzyka przedawkowania"
        ],
        correct: 2
      },
      {
        question: "Tolerancja na opioidy oznacza, że:",
        answers: [
          "Z czasem maleje skuteczność leku przy tej samej dawce",
          "Organizm reaguje coraz silniej na tę samą dawkę",
          "Działanie leku nie zmienia się w czasie",
          "Lek przestaje wiązać się z receptorem"
        ],
        correct: 0
      },
      {
        question: "Objawy zespołu odstawiennego po przewlekłym stosowaniu opioidów obejmują m.in.:",
        answers: [
          "Euforię i brak bólu",
          "Zwiększoną senność i relaksację",
          "Niepokój, ból mięśni, biegunki, poty",
          "Wzrost masy ciała"
        ],
        correct: 2
      },
      {
        question: "Głównym mechanizmem leżącym u podłoża uzależnienia od opioidów jest:",
        answers: [
          "Uszkodzenie kory wzrokowej",
          "Długotrwała adaptacja układu nagrody i szlaków dopaminergicznych",
          "Zanik receptorów GABA",
          "Wzrost liczby neuronów ruchowych"
        ],
        correct: 1
      },
      {
        question: "Najgroźniejszym ostrym skutkiem przedawkowania opioidów jest:",
        answers: [
          "Wzrost ciśnienia tętniczego",
          "Pobudzenie psychoruchowe",
          "Depresja ośrodka oddechowego",
          "Zwiększone napięcie mięśniowe"
        ],
        correct: 2
      },
      {
        question: "Nalokson to lek stosowany w sytuacji:",
        answers: [
          "Nadciśnienia tętniczego",
          "Zatrucia opioidami, jako antagonista receptorów opioidowych",
          "Schizofrenii",
          "Zaburzeń lękowych"
        ],
        correct: 1
      },
      {
        question: "Nalokson działa poprzez:",
        answers: [
          "Zwiększenie syntezy endorfin",
          "Silne pobudzenie receptorów opioidowych",
          "Konkurencyjną blokadę receptorów opioidowych",
          "Zablokowanie wszystkich receptorów dopaminy"
        ],
        correct: 2
      },
      {
        question: "Kryzys opioidowy odnosi się głównie do:",
        answers: [
          "Wzrostu używania benzodiazepin wśród młodzieży",
          "Znaczącego wzrostu uzależnień i zgonów z powodu przedawkowania opioidów, szczególnie leków na receptę i heroiny",
          "Spadku stosowania opioidów w leczeniu bólu nowotworowego",
          "Wzrostu liczby przypadków schizofrenii"
        ],
        correct: 1
      },
      {
        question: "Kryzys opioidowy został szczególnie dobrze udokumentowany w:",
        answers: [
          "Stanach Zjednoczonych",
          "Australii wyłącznie",
          "Afryce Subsaharyjskiej",
          "Na Antarktydzie"
        ],
        correct: 0
      },
      {
        question: "Do czynników napędzających kryzys opioidowy należą m.in.:",
        answers: [
          "Niedostateczna dostępność jakichkolwiek leków przeciwbólowych",
          "Nadmierne przepisywanie silnych opioidów na przewlekły ból oraz dostępność taniej heroiny",
          "Całkowity zakaz przepisywania opioidów",
          "Wyłącznie czynniki genetyczne"
        ],
        correct: 1
      },
      {
        question: "W medycynie opioidy powinny być stosowane:",
        answers: [
          "Tylko rekreacyjnie",
          "Wyłącznie krótkoterminowo w bólu ostrym, nigdy w bólu nowotworowym",
          "Z rozwagą, po ocenie ryzyka i korzyści, szczególnie w bólu przewlekłym",
          "Zawsze jako pierwszy wybór przy każdym bólu"
        ],
        correct: 2
      },
      {
        question: "W leczeniu bólu nowotworowego opioidy:",
        answers: [
          "Nie są zalecane",
          "Mogą być stosowane jako ważny element terapii przeciwbólowej",
          "Zawsze prowadzą do uzależnienia i są zakazane",
          "Zastąpiły całkowicie wszystkie inne metody leczenia bólu"
        ],
        correct: 1
      },
      {
        question: "Zwiększone wydzielanie endorfin podczas intensywnego wysiłku fizycznego wiąże się z:",
        answers: [
          "Pogorszeniem nastroju",
          "Tzw. euforią biegacza (runner's high)",
          "Znacznym nasileniem percepcji bólu",
          "Całkowitym zniesieniem motywacji"
        ],
        correct: 1
      },
      {
        question: "Długotrwałe stosowanie opioidów może prowadzić do zmian w mózgu obejmujących:",
        answers: [
          "Brak jakichkolwiek zmian",
          "Adaptacje w układzie nagrody i osi stresu, zwiększające podatność na nawroty",
          "Natychmiastowy zanik wszystkich neuronów dopaminergicznych",
          "Zanik receptorów GABA"
        ],
        correct: 1
      }
    ];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    const questionsForRender = questions.map(q => {
      const indices = [0, 1, 2, 3];
      shuffle(indices);
      const shuffledAnswers = indices.map(i => q.answers[i]);
      const newCorrectIndex = indices.indexOf(q.correct);
      return {
        question: q.question,
        answers: shuffledAnswers,
        correct: newCorrectIndex
      };
    });

    const container = document.getElementById("questionsContainer");

    questionsForRender.forEach((q, idx) => {
      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const title = document.createElement("div");
      title.className = "question-title";
      title.textContent = (idx + 1) + ". " + q.question;
      qDiv.appendChild(title);

      const answersDiv = document.createElement("div");
      answersDiv.className = "answers";

      q.answers.forEach((answerText, aIdx) => {
        const label = document.createElement("label");

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `q${idx}`;
        radio.value = aIdx;

        const textSpan = document.createElement("span");
        textSpan.textContent = answerText;

        label.appendChild(radio);
        label.appendChild(textSpan);
        answersDiv.appendChild(label);
      });

      qDiv.appendChild(answersDiv);
      container.appendChild(qDiv);
    });

    const form = document.getElementById("quizForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      let correctCount = 0;

      questionsForRender.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        if (!selected) return;
        const answerIndex = parseInt(selected.value, 10);
        if (answerIndex === q.correct) {
          correctCount++;
        }
      });

      const total = questionsForRender.length;
      const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      resultDiv.textContent = `Masz ${correctCount} / ${total} poprawnych odpowiedzi (${percent}%).`;
    });
  </script>
</body>
</html>

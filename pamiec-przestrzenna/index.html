<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Zagadnienie 38 — Pamięć przestrzenna</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }
    p {
      margin-top: 0;
      line-height: 1.6;
    }
    .question {
      margin-bottom: 24px;
      padding: 16px 20px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .question-title {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .answers {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background-color 0.15s ease;
    }
    label:hover {
      background-color: #e5f3ef;
    }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #0f766e;
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(15, 118, 110, 0.35);
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    .submit-btn:hover {
      background-color: #115e59;
      box-shadow: 0 12px 28px rgba(17, 94, 89, 0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Zagadnienie 38 — Pamięć przestrzenna</h1>
      <p>Test jednokrotnego wyboru. Na końcu zobaczysz liczbę poprawnych odpowiedzi i wynik procentowy.</p>
      <p>Odpowiedzi są pomieszane względem kolejności w pliku źródłowym.</p>
    </div>

    <form id="quizForm" class="card">
      <div id="questionsContainer"></div>

      <button type="submit" class="submit-btn">Zakończ test</button>
      <div id="result" class="result"></div>
    </form>
  </div>

  <script>
    const questions = [
      {
        question: "Pamięć przestrzenna odnosi się przede wszystkim do:",
        answers: [
          "Zapamiętywania faktów encyklopedycznych",
          "Zapamiętywania lokalizacji obiektów, układu otoczenia i relacji przestrzennych",
          "Zapamiętywania melodii",
          "Zapamiętywania kolejności słów w zdaniu"
        ],
        correct: 1
      },
      {
        question: "Pamięć przestrzenna jest kluczowa m.in. dla:",
        answers: [
          "Planowania wypowiedzi",
          "Nawigacji w środowisku, odnajdywania drogi i orientacji w otoczeniu",
          "Rozpoznawania dźwięków mowy",
          "Pamięci semantycznej"
        ],
        correct: 1
      },
      {
        question: "Kluczową strukturą mózgową związaną z pamięcią przestrzenną u ssaków jest:",
        answers: [
          "Kora wzrokowa V1",
          "Hipokamp",
          "Rdzeń kręgowy",
          "Móżdżek"
        ],
        correct: 1
      },
      {
        question: "Komórki miejsca (place cells) to neurony, które:",
        answers: [
          "Reagują na specyficzne dźwięki",
          "Wykazują zwiększoną aktywność, gdy zwierzę znajduje się w określonym miejscu w otoczeniu",
          "Odpowiadają tylko za ruch kończyn",
          "Reagują wyłącznie na kolor"
        ],
        correct: 1
      },
      {
        question: "Komórki miejsca zostały odkryte przede wszystkim w:",
        answers: [
          "Ciele migdałowatym",
          "Hipokampie",
          "Móżdżku",
          "Rdzeniu przedłużonym"
        ],
        correct: 1
      },
      {
        question: "Kora śródwęchowa zawiera m.in. tzw. komórki siatki (grid cells), które:",
        answers: [
          "Reagują na konkretne dźwięki mowy",
          "Wykazują aktywność w wielu punktach otoczenia tworzących regularny wzór siatki w przestrzeni",
          "Odpowiadają tylko za ból",
          "Są odpowiedzialne wyłącznie za planowanie ruchu"
        ],
        correct: 1
      },
      {
        question: "Kora ciemieniowa jest istotna w pamięci przestrzennej, ponieważ:",
        answers: [
          "Nie uczestniczy w przetwarzaniu przestrzeni",
          "Uczestniczy w reprezentacji relacji przestrzennych i uwagi przestrzennej",
          "Służy wyłącznie do kontroli ruchu gałek ocznych",
          "Dotyczy tylko przetwarzania bólu"
        ],
        correct: 1
      },
      {
        question: "Reprezentacja egocentryczna przestrzeni opisuje położenie obiektów:",
        answers: [
          "Względem stałych cech otoczenia",
          "Względem ciała obserwatora (np. lewo–prawo, przód–tył)",
          "Zawsze w układzie współrzędnych geograficznych",
          "Wyłącznie względem słońca"
        ],
        correct: 1
      },
      {
        question: "Reprezentacja allocentryczna przestrzeni odnosi się do:",
        answers: [
          "Położenia obiektów względem obserwatora",
          "Położenia obiektów względem siebie i stałych punktów w otoczeniu, niezależnie od pozycji obserwatora",
          "Zawsze do kierunków geograficznych",
          "Tylko do odczuć emocjonalnych"
        ],
        correct: 1
      },
      {
        question: "Hipokamp jest szczególnie kojarzony z reprezentacją:",
        answers: [
          "Egocentryczną",
          "Allocentryczną",
          "Tylko wysokości dźwięków",
          "Wyłącznie układu mięśniowego"
        ],
        correct: 1
      },
      {
        question: "Odkrycie komórek miejsca w hipokampie zawdzięczamy m.in.:",
        answers: [
          "Donaldowi Hebbowi",
          "Johnowi O'Keefe'owi",
          "Sigmundowi Freudowi",
          "B.F. Skinnerowi"
        ],
        correct: 1
      },
      {
        question: "Odkrycie komórek siatki w korze śródwęchowej zawdzięczamy m.in.:",
        answers: [
          "Ericowi Kandelowi",
          "May-Britt i Edvardowi Moserom",
          "Wilderowi Penfieldowi",
          "Ivanowi Pawłowowi"
        ],
        correct: 1
      },
      {
        question: "Przykładem zadania badającego pamięć przestrzenną u ludzi jest:",
        answers: [
          "Test fluencji słownej",
          "Labirynt w wirtualnej rzeczywistości lub klasyczny test labiryntów",
          "Powtarzanie cyfr w kolejności",
          "Rozpoznawanie tonów muzycznych"
        ],
        correct: 1
      },
      {
        question: "Pacjenci z uszkodzeniem hipokampa mogą mieć szczególne trudności z:",
        answers: [
          "Rozpoznawaniem twarzy przy zachowanej orientacji przestrzennej",
          "Orientacją w nowym otoczeniu i uczeniem się nowych tras",
          "Rozumieniem języka",
          "Wykonywaniem prostych ruchów"
        ],
        correct: 1
      },
      {
        question: "Zespół zaniedbywania stronnego (neglect) najczęściej wiąże się z uszkodzeniem:",
        answers: [
          "Hipokampa",
          "Prawej kory ciemieniowej",
          "Rdzenia kręgowego",
          "Ciała migdałowatego"
        ],
        correct: 1
      },
      {
        question: "W zaniedbywaniu stronnym pacjent często:",
        answers: [
          "Nie zauważa obiektów po stronie przeciwnej do uszkodzenia mimo braku ślepoty siatkówkowej",
          "Nie słyszy dźwięków",
          "Traci pamięć roboczą",
          "Nie rozpoznaje twarzy"
        ],
        correct: 0
      },
      {
        question: "Strategia nawigacji oparta na punktach orientacyjnych (landmark-based) polega na:",
        answers: [
          "Liczeniu kroków bez względu na otoczenie",
          "Wykorzystywaniu charakterystycznych obiektów w otoczeniu do określenia drogi",
          "Wyłącznie na zapamiętywaniu sekwencji ruchów ciała",
          "Na przypadkowym poruszaniu się"
        ],
        correct: 1
      },
      {
        question: "Strategia nawigacji oparta na ścieżce (route-based) polega na:",
        answers: [
          "Wyłącznie na globalnej mapie allocentrycznej",
          "Zapamiętywaniu kolejnych skrętów i odcinków trasy z perspektywy egocentrycznej",
          "Tylko na położeniu względem gwiazd",
          "Tylko na komórkach miejsca"
        ],
        correct: 1
      },
      {
        question: "Pamięć przestrzenna jest często uważana za część szerszego systemu:",
        answers: [
          "Pamięci proceduralnej",
          "Pamięci epizodycznej (lokalizacja zdarzeń w przestrzeni)",
          "Pamięci sensorycznej",
          "Pamięci semantycznej"
        ],
        correct: 1
      },
      {
        question: "Wspomnienia epizodyczne często zawierają komponent przestrzenny, ponieważ:",
        answers: [
          "Zdarzenia nie są umiejscowione w przestrzeni",
          "Zawierają informacje o tym, gdzie miało miejsce zdarzenie",
          "Dotyczą tylko czasu",
          "Dotyczą tylko emocji"
        ],
        correct: 1
      },
      {
        question: "Które z poniższych stwierdzeń jest PRAWIDŁOWE?",
        answers: [
          "Pamięć przestrzenna nie ma określonych korelatów neuroanatomicznych",
          "Pamięć przestrzenna jest silnie związana z hipokampem, korą śródwęchową i ciemieniową",
          "Pamięć przestrzenna dotyczy tylko zwierząt",
          "Ludzie nie mają pamięci przestrzennej"
        ],
        correct: 1
      },
      {
        question: "Które z poniższych stwierdzeń jest FAŁSZYWE?",
        answers: [
          "Komórki miejsca reagują na określone lokalizacje w otoczeniu",
          "Komórki siatki wykazują wzór aktywności w postaci heksagonalnej siatki w przestrzeni",
          "Kora ciemieniowa bierze udział w orientacji przestrzennej",
          "Pamięć przestrzenna nie ma żadnego związku z hipokampem"
        ],
        correct: 3
      }
    ];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    const questionsForRender = questions.map(q => {
      const indices = [0, 1, 2, 3];
      shuffle(indices);
      const shuffledAnswers = indices.map(i => q.answers[i]);
      const newCorrectIndex = indices.indexOf(q.correct);
      return {
        question: q.question,
        answers: shuffledAnswers,
        correct: newCorrectIndex
      };
    });

    const container = document.getElementById("questionsContainer");

    questionsForRender.forEach((q, idx) => {
      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const title = document.createElement("div");
      title.className = "question-title";
      title.textContent = (idx + 1) + ". " + q.question;
      qDiv.appendChild(title);

      const answersDiv = document.createElement("div");
      answersDiv.className = "answers";

      q.answers.forEach((answerText, aIdx) => {
        const label = document.createElement("label");

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `q${idx}`;
        radio.value = aIdx;

        const textSpan = document.createElement("span");
        textSpan.textContent = answerText;

        label.appendChild(radio);
        label.appendChild(textSpan);
        answersDiv.appendChild(label);
      });

      qDiv.appendChild(answersDiv);
      container.appendChild(qDiv);
    });

    const form = document.getElementById("quizForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      let correctCount = 0;

      questionsForRender.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        if (!selected) return;
        const answerIndex = parseInt(selected.value, 10);
        if (answerIndex === q.correct) {
          correctCount++;
        }
      });

      const total = questionsForRender.length;
      const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      resultDiv.textContent = `Masz ${correctCount} / ${total} poprawnych odpowiedzi (${percent}%).`;
    });
  </script>
</body>
</html>

const quiz = document.getElementById('quiz');

questions.forEach((item, i) => {
  const div = document.createElement('div');
  div.className = 'q';

  // losowa kolejność odpowiedzi dla każdego pytania
  const indices = item.a.map((_, idx) => idx);
  for (let j = indices.length - 1; j > 0; j--) {
    const k = Math.floor(Math.random() * (j + 1));
    [indices[j], indices[k]] = [indices[k], indices[j]];
  }

  let answersHtml = "";
  indices.forEach((idx) => {
    answersHtml += `
      <label>
        <input type="radio" name="q${i}" value="${idx}">
        ${item.a[idx]}
      </label>
    `;
  });

  div.innerHTML = `<h3>${i+1}. ${item.q}</h3>` + answersHtml;
  quiz.appendChild(div);
});

function finishQuiz() {
  let correct = 0;
  questions.forEach((item, i) => {
    const picked = document.querySelector(\`input[name="q\${i}"]:checked\`);
    if (picked && Number(picked.value) === item.c) correct++;
  });
  const percent = Math.round((correct / questions.length) * 100);
  const result = document.getElementById('result');
  result.style.display = 'block';
  result.innerHTML = `
    <h2>Podsumowanie wyników</h2>
    <p>Poprawne odpowiedzi: <strong>${correct} z ${questions.length}</strong></p>
    <p>Wynik procentowy: <strong>${percent}%</strong></p>
  `;
  window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
}

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Zagadnienie 3 — Język i mózg</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }
    p {
      margin-top: 0;
      line-height: 1.6;
    }
    .question {
      margin-bottom: 24px;
      padding: 16px 20px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .question-title {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .answers {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background-color 0.15s ease;
    }
    label:hover {
      background-color: #e5f3ef;
    }
    .option-letter {
      font-weight: 600;
      color: #064e3b;
      width: 20px;
    }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #0f766e;
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(15, 118, 110, 0.35);
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    .submit-btn:hover {
      background-color: #115e59;
      box-shadow: 0 12px 28px rgba(17, 94, 89, 0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Zagadnienie 3 — Język i mózg</h1>
      <p>Test jednokrotnego wyboru. Na końcu zobaczysz liczbę poprawnych odpowiedzi i wynik procentowy.</p>
      <p>Odpowiedzi są pomieszane względem kolejności w pliku źródłowym.</p>
    </div>

    <form id="quizForm" class="card">
      <div id="questionsContainer"></div>

      <button type="submit" class="submit-btn">Zakończ test</button>
      <div id="result" class="result"></div>
    </form>
  </div>

  <script>
    const questions = [

          "Określone obszary mózgu odpowiadają za język i zazwyczaj znajdują się głównie w jednej (lewej) półkuli",
          "Język jest zależny tylko od móżdżku i pnia mózgu"

        correct: 2 // C

      {

          "Jean-Baptiste Bouillaud",
          "Paul Broca",
          "Karl Wernicke"
        ],

          "Funkcje językowe są zlokalizowane w lewej półkuli mózgu",

      {

          "Związek zaburzeń mowy z uszkodzeniem lewej półkuli mózgu",
          "Związek zaburzeń mowy z uszkodzeniem móżdżku",
          "Brak związku między uszkodzeniami mózgu a zaburzeniami mowy"
        ],
        correct: 1 // B
      },
      {
        question: "Jak nazywał się najsłynniejszy pacjent Broki, który mógł wypowiadać prawie wyłącznie sylabę „tan”?",
        answers: [
          "Pacjent H.M.",
          "Pacjent N.A.",
          "Louis Victor Leborgne",
          "Kent Cochran"
        ],
        correct: 2 // C
      },
      {
        question: "Co wykazała autopsja mózgu pacjenta „Tan”?",
        answers: [
          "Rozlane uszkodzenia całej kory mózgowej",

          "Uszkodzenie prawego płata skroniowego",
          "Uszkodzenie móżdżku przy zachowanej korze"
        ],
        correct: 1 // B
      },
      {
        question: "Jak nazywa się zespół objawów polegający na trudności w formułowaniu wypowiedzi przy względnie zachowanym rozumieniu mowy, związany z uszkodzeniem lewego płata czołowego?",
        answers: [
          "Afazja Wernickego",
          "Afazja Broki",
          "Agnozja wzrokowa",
          "Apraksja ruchowa"
        ],
        correct: 1 // B
      },
      {
        question: "Jakie objawy są typowe dla afazji Broki?",
        answers: [
          "Płynna, ale niezrozumiała mowa i brak rozumienia",
          "Spowolniona, niepłynna mowa z licznymi przerwami, przy stosunkowo dobrym rozumieniu mowy",
          "Całkowita utrata słuchu przy zachowanej mowie",
          "Prawidłowa mowa, ale brak rozumienia pojedynczych słów"
        ],
        correct: 1 // B
      },
      {
        question: "Jak nazywa się obszar w płacie skroniowym odpowiedzialny za rozumienie mowy, którego uszkodzenie opisano w 1874 roku?",
        answers: [
          "Ośrodek Broki",
          "Ośrodek Wernickego",
          "Pole Brodmanna 17",
          "Zakręt zaśrodkowy"
        ],

      },
      {
        question: "Jaki jest typowy obraz kliniczny afazji Wernickego?",
        answers: [

          "Płynna, często logoreiczna mowa, ale zaburzone rozumienie i niemożność powtarzania",
          "Niemożność nazywania przedmiotów przy zachowanej płynności i rozumieniu",

      {

        correct: 1 // B
      },
      {
        question: "Jaki szlak włókien istoty białej łączy klasycznie opisywane ośrodki Broki i Wernickego?",

          "Konwergencja",

          "Lateralizacja języka nie występuje u osób praworęcznych"

        correct: 1 // B
      },
      {
        question: "Jakie znaczenie ma obserwacja, że uszkodzenie jednej półkuli mózgu upośledza ruchy przeciwnej strony ciała (kontralateralność) w kontekście języka?",
        answers: [
          "Pozwala wiązać zaburzenia mowy z uszkodzeniami lewej półkuli u pacjentów z paraliżem prawej strony",
          "Dowodzi, że mowa zależy wyłącznie od prawej półkuli",
          "Sugeruje, że mowa zależy od móżdżku",
          "Nie ma znaczenia dla lokalizacji języka"
        ],
        correct: 0 // A
      },
      {
        question: "Które z poniższych badań neuroobrazowych dostarcza informacji o bardzo precyzyjnym czasie aktywacji obszarów językowych (rozdzielczość czasowa w milisekundach)?",
        answers: [
          "fMRI",
          "PET",
          "MEG (magnetoencefalografia)",
          "CT"
        ],
        correct: 2 // C
      },
      {
        question: "W badaniu Pulvermüllera i wsp. (MEG) aktywacja którego obszaru pojawiała się około 136 ms po informacji wystarczającej do rozpoznania słowa?",
        answers: [
          "Lewy dolny płat czołowy (inferior frontal)",
          "Lewy górny płat skroniowy (superior temporal)",
          "Prawy płat ciemieniowy",
          "Kora wzrokowa w płacie potylicznym"
        ],
        correct: 1 // B
      },
      {
        question: "O ile milisekund później niż obszar skroniowy aktywował się w tym badaniu lewy dolny płat czołowy (inferior frontal)?",
        answers: [
          "O około 5 ms",
          "O około 10 ms",
          "O około 20 ms",
          "O około 50 ms"
        ],
        correct: 1 // B
      },
      {
        question: "Jakie zaburzenie mowy polegające na utracie zdolności do formułowania wypowiedzi językowych wiąże się z uszkodzeniem ośrodka Broki?",
        answers: [
          "Afazja Wernickego (afazja płynna)",
          "Afazja Broki (afazja niepłynna, ekspresyjna)",
          "Agnozja wzrokowa",
          "Apraksja mowy"
        ],
        correct: 1 // B
      },
      {
        question: "Który wcześniejszy badacz przed Broką zaobserwował, że zaburzenia mowy wiążą się z uszkodzeniem lewej półkuli mózgu, lecz pozostał stosunkowo nieznany?",
        answers: [
          "Karl Wernicke",
          "Marc Dax",
          "Jean-Baptiste Bouillaud",
          "Camillo Golgi"
        ],
        correct: 1 // B
      },
      {
        question: "Jakie zaburzenie charakteryzowało pacjentów z uszkodzeniem obszaru Wernickego?",
        answers: [
          "Niemożność wypowiadania jakichkolwiek słów",
          "Płynne wypowiadanie słów i zdań, lecz bez rozumienia mowy i bez możliwości jej powtarzania",
          "Utrata słuchu przy zachowanej zdolności mówienia",
          "Niemożność czytania przy zachowanej zdolności mówienia i rozumienia"
        ],
        correct: 1 // B
      },
      {
        question: "W którym płacie mózgu zlokalizowany jest ośrodek Wernickego?",
        answers: [
          "Płat czołowy",
          "Płat ciemieniowy",
          "Płat skroniowy",
          "Płat potyliczny"
        ],
        correct: 2 // C
      },
      {
        question: "Neuropsychologia jako nauka bada przede wszystkim:",
        answers: [
          "Wyłącznie zaburzenia neurologiczne i ich leczenie",
          "Związki między mózgiem a zachowaniem",
          "Wyłącznie strukturę anatomiczną układu nerwowego",
          "Działanie leków psychotropowych na mózg"
        ],
        correct: 1 // B
      },
      {
        question: "Które organy były zachowywane przez starożytnych Egipcjan w procesie mumifikacji (wkładane do kanop)?",
        answers: [
          "Mózg i serce",
          "Mózg, wątroba i płuca",
          "Serce, wątroba, żołądek i jelita",
          "Tylko serce"
        ],
        correct: 2 // C
      },
      {
        question: "W jakim mieście Jan Evangelista Purkyně po raz pierwszy opisał komórki nerwowe móżdżku (komórki Purkyniego)?",
        answers: [
          "Pradze",
          "Wiedniu",
          "Wrocławiu (Breslau)",
          "Berlinie"
        ],
        correct: 2 // C
      },
      {
        question: "Dlaczego Wrocław jest ważnym miejscem w historii neuropsychologii?",
        answers: [
          "Tu opracowano metodę barwienia preparatów Golgiego",
          "Tu Paul Broca odkrył ośrodek mowy",
          "Tu Jan Evangelista Purkyně po raz pierwszy opisał komórki nerwowe z móżdżku",
          "Tu Kartezjusz sformułował teorię dualizmu"
        ],
        correct: 2 // C
      },
      {
        question: "Które dwie postaci otrzymały w 1906 roku Nagrodę Nobla za odkrycia dotyczące budowy układu nerwowego?",
        answers: [

          "Franz Gall i Johann Spurzheim",
          "Leonardo da Vinci i Andreas Vesalius"
        ],
        correct: 1 // B
      },
      {

          "Analizie aktywności elektrycznej mózgu u zdrowych ochotników",
          "Analizie przypadków pacjentów z uszkodzeniami mózgu i konsekwencjach tych uszkodzeń dla zachowania",
          "Badaniu genetycznych podstaw funkcjonowania mózgu",
          "Opracowywaniu leków neuroprotekcyjnych"
        ],
        correct: 1 // B
      },
      {
        question: "Termin „the mind-body problem” w języku polskim odpowiada:",
        answers: [
          "Problemowi lokalizacji funkcji mózgowych",
          "Problemowi psychofizycznemu – relacji między umysłem a ciałem/mózgiem",
          "Problemowi ewolucji mózgu",
          "Problemowi neuroplastyczności"
        ],
        correct: 1 // B
      },
      {
        question: "Andreas Vesalius jest uznawany za:",
        answers: [
          "Odkrywcę ośrodka mowy w mózgu",
          "Twórcę frenologii",
          "Twórcę nowoczesnej anatomii człowieka, autora dzieła o budowie ciała ludzkiego",
          "Odkrywcę neuronu jako podstawowej jednostki układu nerwowego"
        ],
        correct: 2 // C
      }
    ];

    // tasowanie odpowiedzi w każdym pytaniu
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    const questionsForRender = questions.map(q => {
      const indices = [0, 1, 2, 3];
      shuffle(indices);
      const shuffledAnswers = indices.map(i => q.answers[i]);
      const newCorrectIndex = indices.indexOf(q.correct);
      return {
        question: q.question,
        answers: shuffledAnswers,
        correct: newCorrectIndex
      };
    });

    const letters = ["A", "B", "C", "D"];
    const container = document.getElementById("questionsContainer");

    questionsForRender.forEach((q, idx) => {
      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const title = document.createElement("div");
      title.className = "question-title";
      title.textContent = (idx + 1) + ". " + q.question;
      qDiv.appendChild(title);

      const answersDiv = document.createElement("div");
      answersDiv.className = "answers";

      q.answers.forEach((answerText, aIdx) => {
        const id = `q${idx}_a${aIdx}`;

        const label = document.createElement("label");

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `q${idx}`;
        radio.value = aIdx;
        radio.id = id;

        const letterSpan = document.createElement("span");
        letterSpan.className = "option-letter";
        letterSpan.textContent = letters[aIdx] + ")";

        const textSpan = document.createElement("span");
        textSpan.textContent = answerText;

        label.appendChild(radio);
        label.appendChild(letterSpan);
        label.appendChild(textSpan);

        answersDiv.appendChild(label);
      });

      qDiv.appendChild(answersDiv);
      container.appendChild(qDiv);
    });

    const form = document.getElementById("quizForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      let correctCount = 0;

      questionsForRender.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        if (!selected) return;
        const answerIndex = parseInt(selected.value, 10);
        if (answerIndex === q.correct) {
          correctCount++;
        }
      });

      const total = questionsForRender.length;
      const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      resultDiv.textContent = `Masz ${correctCount} / ${total} poprawnych odpowiedzi (${percent}%).`;
    });
  </script>
</body>
</html>

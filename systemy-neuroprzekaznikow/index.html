<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Zagadnienie 9 — Systemy neuroprzekaźników</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }
    p {
      margin-top: 0;
      line-height: 1.6;
    }
    .question {
      margin-bottom: 24px;
      padding: 16px 20px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .question-title {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .answers {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background-color 0.15s ease;
    }
    label:hover {
      background-color: #e5f3ef;
    }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #0f766e;
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(15, 118, 110, 0.35);
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    .submit-btn:hover {
      background-color: #115e59;
      box-shadow: 0 12px 28px rgba(17, 94, 89, 0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Zagadnienie 9 — Systemy neuroprzekaźników</h1>
      <p>Test jednokrotnego wyboru. Na końcu zobaczysz liczbę poprawnych odpowiedzi i wynik procentowy.</p>
      <p>Odpowiedzi są pomieszane względem kolejności w pliku źródłowym.</p>
    </div>

    <form id="quizForm" class="card">
      <div id="questionsContainer"></div>

      <button type="submit" class="submit-btn">Zakończ test</button>
      <div id="result" class="result"></div>
    </form>
  </div>

  <script>
    const questions = [
      {
        question: "Które trzy główne klasy neuroprzekaźników wyróżnia się zazwyczaj pod względem budowy chemicznej?",
        answers: [
          "Aminokwasy, monoaminy, neuropeptydy",
          "Lipidy, węglowodany, białka",
          "Hormony, enzymy, witaminy",
          "Neurotoksyny, elektrolity, białka"
        ],
        correct: 0 // A
      },
      {
        question: "Który z poniższych neuroprzekaźników jest klasyfikowany jako aminokwasowy?",
        answers: [
          "Dopamina",
          "Serotonina",
          "GABA",
          "Acetylocholina"
        ],
        correct: 2 // C
      },
      {
        question: "Glutaminian (glutamate) w OUN pełni przede wszystkim rolę:",
        answers: [
          "Głównego pobudzającego neuroprzekaźnika",
          "Głównego hamującego neuroprzekaźnika",
          "Hormonu steroidowego",
          "Neuropeptydu opioidowego"
        ],
        correct: 0 // A
      },
      {
        question: "GABA (kwas gamma-aminomasłowy) jest:",
        answers: [
          "Głównym neuroprzekaźnikiem pobudzającym w OUN",
          "Głównym neuroprzekaźnikiem hamującym w OUN",
          "Wyłącznie hormonem obwodowym",
          "Peptydem opioidowym"
        ],
        correct: 1 // B
      },
      {
        question: "Do monoamin zaliczamy między innymi:",
        answers: [
          "Glutaminian, GABA, glicynę",
          "Dopaminę, noradrenalinę, serotoninę",
          "Acetylocholinę, histaminę, glicynę",
          "Oksytocynę, wazopresynę, endorfiny"
        ],
        correct: 1 // B
      },
      {
        question: "Który z poniższych jest przykładem neuropeptydu?",
        answers: [
          "Serotonina",
          "Acetylocholina",
          "Endorfiny",
          "Glicyna"
        ],
        correct: 2 // C
      },
      {
        question: "Acetylocholina (ACh) zaliczana jest do:",
        answers: [
          "Aminokwasów pobudzających",
          "Monoamin katecholaminowych",
          "Osobnej klasy małocząsteczkowych neuroprzekaźników cholinergicznych",
          "Neuropeptydów opioidowych"
        ],
        correct: 2 // C
      },
      {
        question: "Katecholaminy to grupa monoamin obejmująca:",
        answers: [
          "Dopaminę, noradrenalinę, adrenalinę",
          "Serotoninę, melatoninę, histaminę",
          "Glutaminian, GABA, glicynę",
          "Endorfiny, enkefaliny, dynorfiny"
        ],
        correct: 0 // A
      },
      {
        question: "Serotonina (5-HT) zaliczana jest do:",
        answers: [
          "Katecholamin",
          "Indolamin",
          "Peptydów opioidowych",
          "Aminokwasów obojętnych"
        ],
        correct: 1 // B
      },
      {
        question: "Który z układów neuroprzekaźnikowych wiąże się szczególnie z układem nagrody i motywacją?",
        answers: [
          "Układ dopaminergiczny mezolimbiczny",
          "Układ GABA-ergiczny rdzenia kręgowego",
          "Układ glutaminergiczny móżdżku",
          "Układ glicynergiczny pnia mózgu"
        ],
        correct: 0 // A
      },
      {
        question: "Który z poniższych neuroprzekaźników jest głównie odpowiedzialny za reakcje „walcz lub uciekaj” (fight or flight) w układzie współczulnym?",
        answers: [
          "GABA",
          "Noradrenalina (norepinefryna)",
          "Serotonina",
          "Dopamina"
        ],
        correct: 1 // B
      },
      {
        question: "Który z neuroprzekaźników jest szczególnie związany z regulacją nastroju, snu i apetytu?",
        answers: [
          "Serotonina",
          "Glicyna",
          "Glutaminian",
          "Histamina"
        ],
        correct: 0 // A
      },
      {
        question: "Neuropeptydy różnią się od małocząsteczkowych neuroprzekaźników tym, że:",
        answers: [
          "Są syntetyzowane w zakończeniu presynaptycznym, a nie w somie",
          "Zazwyczaj działają przez receptory jonotropowe",
          "Mają zwykle dłuższe i bardziej rozlane działanie modulujące",
          "Nie są magazynowane w pęcherzykach synaptycznych"
        ],
        correct: 2 // C
      },
      {
        question: "Który z poniższych jest przykładem peptydowego neuromodulatora związanego z odczuwaniem bólu i nagrody?",
        answers: [
          "Glutaminian",
          "Endorfiny",
          "Dopamina",
          "Acetylocholina"
        ],
        correct: 1 // B
      },
      {
        question: "Układ cholinergiczny w mózgu (ACh) jest szczególnie ważny dla:",
        answers: [
          "Regulacji ciśnienia krwi",
          "Procesów uwagi, uczenia się i pamięci",
          "Kontroli równowagi kwasowo-zasadowej",
          "Regulacji temperatury ciała"
        ],
        correct: 1 // B
      },
      {
        question: "Które stwierdzenie dotyczące układu dopaminergicznego jest prawdziwe?",
        answers: [
          "Jedynym źródłem dopaminy jest hipokamp",
          "Szlaki dopaminergiczne obejmują m.in. szlak nigrostriatalny i mezolimbiczny",
          "Dopamina działa wyłącznie hamująco",
          "Nie ma znaczenia w chorobach psychicznych"
        ],
        correct: 1 // B
      },
      {
        question: "Spadek aktywności dopaminergicznej w szlaku nigrostriatalnym jest charakterystyczny dla:",
        answers: [
          "Choroby afektywnej dwubiegunowej",
          "Choroby Parkinsona",
          "Zaburzeń lękowych",
          "Otępienia czołowo-skroniowego"
        ],
        correct: 1 // B
      },
      {
        question: "Leki przeciwpsychotyczne (neuroleptyki) pierwszej generacji działają głównie poprzez:",
        answers: [
          "Pobudzenie receptorów dopaminowych D2",
          "Blokadę receptorów dopaminowych D2",
          "Hamowanie wychwytu zwrotnego serotoniny",
          "Zwiększenie uwalniania glutaminianu"
        ],
        correct: 1 // B
      },
      {
        question: "Selektywne inhibitory wychwytu zwrotnego serotoniny (SSRI) działają poprzez:",
        answers: [
          "Blokowanie receptorów serotoninowych",
          "Hamowanie enzymu rozkładającego serotoninę w szczelinie",
          "Hamowanie transportera wychwytu zwrotnego serotoniny, zwiększając jej stężenie w synapsie",
          "Bezpośrednie pobudzanie receptorów dopaminowych"
        ],
        correct: 2 // C
      },
      {
        question: "Który z poniższych procesów MOŻE być skutkiem przewlekłego stosowania leków działających na systemy neuroprzekaźników?",
        answers: [
          "Brak jakichkolwiek zmian w synapsach",
          "Zmiany liczby receptorów, ich wrażliwości oraz modyfikacje plastyczności synaptycznej",
          "Całkowite zablokowanie transmisji synaptycznej",
          "Natychmiastowa nieodwracalna zmiana struktury mózgu po pierwszej dawce"
        ],
        correct: 1 // B
      }
    ];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    const questionsForRender = questions.map(q => {
      const indices = [0, 1, 2, 3];
      shuffle(indices);
      const shuffledAnswers = indices.map(i => q.answers[i]);
      const newCorrectIndex = indices.indexOf(q.correct);
      return {
        question: q.question,
        answers: shuffledAnswers,
        correct: newCorrectIndex
      };
    });

    const container = document.getElementById("questionsContainer");

    questionsForRender.forEach((q, idx) => {
      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const title = document.createElement("div");
      title.className = "question-title";
      title.textContent = (idx + 1) + ". " + q.question;
      qDiv.appendChild(title);

      const answersDiv = document.createElement("div");
      answersDiv.className = "answers";

      q.answers.forEach((answerText, aIdx) => {
        const id = `q${idx}_a${aIdx}`;

        const label = document.createElement("label");

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `q${idx}`;
        radio.value = aIdx;
        radio.id = id;

        const textSpan = document.createElement("span");
        textSpan.textContent = answerText;

        label.appendChild(radio);
        label.appendChild(textSpan);

        answersDiv.appendChild(label);
      });

      qDiv.appendChild(answersDiv);
      container.appendChild(qDiv);
    });

    const form = document.getElementById("quizForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      let correctCount = 0;

      questionsForRender.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        if (!selected) return;
        const answerIndex = parseInt(selected.value, 10);
        if (answerIndex === q.correct) {
          correctCount++;
        }
      });

      const total = questionsForRender.length;
      const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      resultDiv.textContent = `Masz ${correctCount} / ${total} poprawnych odpowiedzi (${percent}%).`;
    });
  </script>
</body>
</html>

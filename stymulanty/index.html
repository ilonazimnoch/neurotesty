<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Zagadnienie 13 — Stymulanty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }
    p {
      margin-top: 0;
      line-height: 1.6;
    }
    .question {
      margin-bottom: 24px;
      padding: 16px 20px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .question-title {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .answers {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background-color 0.15s ease;
    }
    label:hover {
      background-color: #e5f3ef;
    }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #0f766e;
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(15, 118, 110, 0.35);
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    .submit-btn:hover {
      background-color: #115e59;
      box-shadow: 0 12px 28px rgba(17, 94, 89, 0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Zagadnienie 13 — Stymulanty</h1>
      <p>Test jednokrotnego wyboru. Na końcu zobaczysz liczbę poprawnych odpowiedzi i wynik procentowy.</p>
      <p>Odpowiedzi są pomieszane względem kolejności w pliku źródłowym.</p>
    </div>

    <form id="quizForm" class="card">
      <div id="questionsContainer"></div>

      <button type="submit" class="submit-btn">Zakończ test</button>
      <div id="result" class="result"></div>
    </form>
  </div>

  <script>
    const questions = [
      {
        question: "Stymulanty (psychostymulanty) to substancje, które:",
        answers: [
          "Ogólnie obniżają aktywność OUN i wywołują sedację",
          "Zwiększają aktywność OUN, czuwanie, energię i często nastrój",
          "Działają wyłącznie przeciwpsychotycznie",
          "Zawsze wywołują głęboki sen"
        ],
        correct: 1
      },
      {
        question: "Do klasycznych psychostymulantów zalicza się m.in.:",
        answers: [
          "Kokainę i amfetaminę",
          "Morfina i heroinę",
          "Haloperidol i olanzapinę",
          "Diazepam i lorazepam"
        ],
        correct: 0
      },
      {
        question: "Która z poniższych substancji jest NAJSŁABSZYM stymulantem o działaniu powszechnie spotykanym w diecie?",
        answers: [
          "Amfetamina",
          "Kokaina",
          "Kofeina",
          "Metamfetamina"
        ],
        correct: 2
      },
      {
        question: "Główny mechanizm działania kokainy polega na:",
        answers: [
          "Blokowaniu kanałów sodowych w aksonie",
          "Hamowaniu wychwytu zwrotnego dopaminy, noradrenaliny i serotoniny",
          "Blokowaniu receptorów GABA-A",
          "Zwiększaniu syntezy glutaminianu"
        ],
        correct: 1
      },
      {
        question: "W układzie nagrody kokaina szczególnie silnie zwiększa stężenie dopaminy w:",
        answers: [
          "Móżdżku",
          "Rdzeniu kręgowym",
          "Jądrze półleżącym (nucleus accumbens)",
          "Ciele modzelowatym"
        ],
        correct: 2
      },
      {
        question: "Typowe subiektywne efekty kokainy obejmują:",
        answers: [
          "Euforię, zwiększoną energię, pewność siebie",
          "Głęboką sedację",
          "Silną anestezję ogólną",
          "Wyłącznie zniesienie bólu"
        ],
        correct: 0
      },
      {
        question: "Krótki czas działania kokainy sprzyja:",
        answers: [
          "Brakowi ryzyka uzależnienia",
          "Częstemu dawkowaniu i zwiększonemu ryzyku nadużywania",
          "Wyłącznie efektom terapeutycznym",
          "Długotrwałemu uspokojeniu"
        ],
        correct: 1
      },
      {
        question: "Główny mechanizm działania amfetaminy polega na:",
        answers: [
          "Blokowaniu receptorów dopaminowych",
          "Odwróceniu transportu monoamin (dopaminy, noradrenaliny) i zwiększeniu ich uwalniania",
          "Hamowaniu syntezy dopaminy",
          "Zwiększaniu działania GABA"
        ],
        correct: 1
      },
      {
        question: "Amfetamina klinicznie bywa stosowana (w kontrolowanych dawkach) m.in. w leczeniu:",
        answers: [
          "Schizofrenii",
          "ADHD i narkolepsji",
          "Choroby Alzheimera",
          "Padaczki"
        ],
        correct: 1
      },
      {
        question: "Przewlekłe nadużywanie amfetaminy może prowadzić do:",
        answers: [
          "Braku jakichkolwiek zmian",
          "Objawów psychotycznych (paranoja, halucynacje)",
          "Trwałego poprawienia funkcji poznawczych",
          "Wyłącznie poprawy nastroju"
        ],
        correct: 1
      },
      {
        question: "Metamfetamina w porównaniu z amfetaminą:",
        answers: [
          "Jest słabsza i krócej działająca",
          "Ma silniejsze i dłużej utrzymujące się działanie stymulujące",
          "Nie wpływa na układ dopaminergiczny",
          "Działa wyłącznie uspokajająco"
        ],
        correct: 1
      },
      {
        question: "Długotrwałe nadużywanie metamfetaminy wiąże się z:",
        answers: [
          "Trwałą poprawą pamięci",
          "Ryzykiem neurotoksyczności, uszkodzeniem układu dopaminergicznego i zaburzeniami poznawczymi",
          "Brakiem jakichkolwiek zmian w mózgu",
          "Wyłącznie poprawą koordynacji ruchowej"
        ],
        correct: 1
      },
      {
        question: "Kofeina działa głównie poprzez:",
        answers: [
          "Bezpośrednią stymulację receptorów dopaminy",
          "Blokowanie receptorów adenozyny",
          "Zwiększanie syntezy serotoniny",
          "Zmniejszanie przewodnictwa GABAergicznego bezpośrednio"
        ],
        correct: 1
      },
      {
        question: "Adenozyna w mózgu pełni funkcję:",
        answers: [
          "Silnego stymulanta",
          "Neuromodulatora sprzyjającego senności i zmniejszeniu aktywności neuronów",
          "Głównego neuroprzekaźnika pobudzającego",
          "Neurotoksyny"
        ],
        correct: 1
      },
      {
        question: "Typowe efekty działania kofeiny obejmują:",
        answers: [
          "Zwiększenie czuwania, zmniejszenie senności",
          "Głęboką sedację",
          "Natychmiastową utratę przytomności",
          "Wyłącznie działanie przeciwpsychotyczne"
        ],
        correct: 0
      },
      {
        question: "Większość silnych stymulantów (kokaina, amfetamina) zwiększa poziom dopaminy w:",
        answers: [
          "Rdzeniu przedłużonym",
          "Miejscu sinawym",
          "Jądrze półleżącym i innych strukturach układu nagrody",
          "Móżdżku"
        ],
        correct: 2
      },
      {
        question: "Zwiększenie dopaminy w układzie nagrody prowadzi do:",
        answers: [
          "Zmniejszenia ryzyka uzależnienia",
          "Wzmocnienia zachowań prowadzących do przyjmowania substancji",
          "Wyłącznie efektów sedacyjnych",
          "Blokady pamięci"
        ],
        correct: 1
      },
      {
        question: "Tolerancja na stymulanty oznacza, że:",
        answers: [
          "Z czasem ta sama dawka wywołuje mniejszy efekt",
          "Z czasem ta sama dawka wywołuje coraz większy efekt",
          "Działanie leku nie zmienia się w czasie",
          "Organizm przestaje reagować na dopaminę"
        ],
        correct: 0
      },
      {
        question: "Zespół odstawienny po długotrwałym zażywaniu silnych stymulantów może obejmować:",
        answers: [
          "Silną euforię",
          "Dysforię, zmęczenie, senność, obniżony nastrój",
          "Wyłącznie objawy somatyczne bez zmian nastroju",
          "Trwałą poprawę samopoczucia"
        ],
        correct: 1
      },
      {
        question: "Do powikłań przewlekłego nadużywania stymulantów należą m.in.:",
        answers: [
          "Zwiększone ryzyko zaburzeń psychotycznych i lękowych",
          "Brak jakichkolwiek zaburzeń psychicznych",
          "Tylko zaburzenia somatyczne bez wpływu na psychikę",
          "Wyłącznie poprawa tolerancji wysiłku"
        ],
        correct: 0
      },
      {
        question: "W kontekście klinicznym leki stymulujące (np. metylfenidat):",
        answers: [
          "Nigdy nie są stosowane ze względu na ryzyko uzależnienia",
          "Mogą być stosowane w leczeniu ADHD, poprawiając koncentrację i kontrolę impulsów",
          "Są stosowane wyłącznie jako leki nasenne",
          "Zastępują wszystkie inne leki przeciwdepresyjne"
        ],
        correct: 1
      },
      {
        question: "Różnica między użyciem terapeutycznym a nadużywaniem stymulantów polega głównie na:",
        answers: [
          "Dawkowaniu, sposobie przyjmowania i kontroli lekarskiej",
          "Rodzaju substancji — stymulanty nigdy nie są nadużywane",
          "Braku wpływu na układ nagrody w dawkach nadużywanych",
          "Tym, że tylko leki na receptę uzależniają"
        ],
        correct: 0
      },
      {
        question: "Łączenie silnych stymulantów z innymi substancjami (np. alkoholem, benzodiazepinami):",
        answers: [
          "Zawsze jest bezpieczne",
          "Może zwiększać ryzyko działań niepożądanych, w tym zaburzeń rytmu serca i zachowań ryzykownych",
          "Nie ma żadnego wpływu na zdrowie",
          "Jest zalecane w celu zmniejszenia ryzyka uzależnienia"
        ],
        correct: 1
      }
    ];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    const questionsForRender = questions.map(q => {
      const indices = [0, 1, 2, 3];
      shuffle(indices);
      const shuffledAnswers = indices.map(i => q.answers[i]);
      const newCorrectIndex = indices.indexOf(q.correct);
      return {
        question: q.question,
        answers: shuffledAnswers,
        correct: newCorrectIndex
      };
    });

    const container = document.getElementById("questionsContainer");

    questionsForRender.forEach((q, idx) => {
      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const title = document.createElement("div");
      title.className = "question-title";
      title.textContent = (idx + 1) + ". " + q.question;
      qDiv.appendChild(title);

      const answersDiv = document.createElement("div");
      answersDiv.className = "answers";

      q.answers.forEach((answerText, aIdx) => {
        const label = document.createElement("label");

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `q${idx}`;
        radio.value = aIdx;

        const textSpan = document.createElement("span");
        textSpan.textContent = answerText;

        label.appendChild(radio);
        label.appendChild(textSpan);
        answersDiv.appendChild(label);
      });

      qDiv.appendChild(answersDiv);
      container.appendChild(qDiv);
    });

    const form = document.getElementById("quizForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      let correctCount = 0;

      questionsForRender.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        if (!selected) return;
        const answerIndex = parseInt(selected.value, 10);
        if (answerIndex === q.correct) {
          correctCount++;
        }
      });

      const total = questionsForRender.length;
      const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      resultDiv.textContent = `Masz ${correctCount} / ${total} poprawnych odpowiedzi (${percent}%).`;
    });
  </script>
</body>
</html>

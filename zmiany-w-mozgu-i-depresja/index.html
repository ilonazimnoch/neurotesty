<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Zagadnienie 33 — Zmiany w mózgu i depresja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }
    p {
      margin-top: 0;
      line-height: 1.6;
    }
    .question {
      margin-bottom: 24px;
      padding: 16px 20px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .question-title {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .answers {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background-color 0.15s ease;
    }
    label:hover {
      background-color: #e5f3ef;
    }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #0f766e;
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(15, 118, 110, 0.35);
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    .submit-btn:hover {
      background-color: #115e59;
      box-shadow: 0 12px 28px rgba(17, 94, 89, 0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Zagadnienie 33 — Zmiany w mózgu i depresja</h1>
      <p>Test jednokrotnego wyboru. Na końcu zobaczysz liczbę poprawnych odpowiedzi i wynik procentowy.</p>
      <p>Odpowiedzi są pomieszane względem kolejności w pliku źródłowym.</p>
    </div>

    <form id="quizForm" class="card">
      <div id="questionsContainer"></div>

      <button type="submit" class="submit-btn">Zakończ test</button>
      <div id="result" class="result"></div>
    </form>
  </div>

  <script>
    const questions = [
      {
        question: "Mówiąc o \"zmianach w mózgu\" w depresji, ma się na myśli m.in.:",
        answers: [
          "Tylko zmiany w kościach czaszki",
          "Zmiany strukturalne, funkcjonalne i neurochemiczne w różnych obszarach mózgu",
          "Zmiany w kolorze włosów",
          "Wyłącznie urazy mechaniczne"
        ],
        correct: 1
      },
      {
        question: "W ujęciu neurobiologicznym depresja jest:",
        answers: [
          "Wyłącznie kwestią słabej woli",
          "Złożonym zaburzeniem obejmującym interakcje między czynnikami psychologicznymi, społecznymi i neurobiologicznymi",
          "Zawsze wywołana pojedynczym urazem głowy",
          "Zawsze wynikiem jednej konkretnej mutacji"
        ],
        correct: 1
      },
      {
        question: "W wielu badaniach strukturalnych MRI w depresji stwierdzano u części pacjentów:",
        answers: [
          "Zwiększenie objętości hipokampa",
          "Zmniejszenie objętości hipokampa i niektórych obszarów kory przedczołowej",
          "Brak jakichkolwiek różnic w strukturze mózgu",
          "Całkowity zanik mózgu"
        ],
        correct: 1
      },
      {
        question: "Zmniejszona objętość hipokampa w depresji wiązana jest m.in. z:",
        answers: [
          "Neurotoksycznym wpływem przewlekłego stresu i podwyższonego kortyzolu",
          "Brakiem jakichkolwiek hormonów stresu",
          "Wyłącznie urazami mechanicznymi",
          "Zawsze z infekcją bakteryjną"
        ],
        correct: 0
      },
      {
        question: "Zmiany w korze przedczołowej (np. grzbietowo-bocznej) w depresji obejmują często:",
        answers: [
          "Zwiększenie grubości kory i poprawę funkcji wykonawczych",
          "Zmniejszenie objętości/grubości oraz zaburzenia funkcji wykonawczych i regulacji emocji",
          "Brak wpływu na funkcje poznawcze",
          "Wyłącznie zmiany w ciemieniowej korze czuciowej"
        ],
        correct: 1
      },
      {
        question: "Badania fMRI w depresji wykazują często zmiany w tzw. sieci domyślnej (DMN), co może wiązać się z:",
        answers: [
          "Brakiem jakichkolwiek myśli",
          "Nasiloną ruminacją i samoreferencyjnym przetwarzaniem informacji",
          "Poprawą koncentracji",
          "Wyłącznie zaburzeniami słuchu"
        ],
        correct: 1
      },
      {
        question: "W depresji obserwuje się często zaburzenia łączności funkcjonalnej między:",
        answers: [
          "Korą przedczołową a strukturami limbicznymi (np. ciało migdałowate)",
          "Rdzeniem kręgowym a kośćmi czaszki",
          "Mięśniami a skórą",
          "Tylko wątrobą a żołądkiem"
        ],
        correct: 0
      },
      {
        question: "Nadreaktywność ciała migdałowatego w odpowiedzi na bodźce negatywne w depresji może wiązać się z:",
        answers: [
          "Zmniejszoną wrażliwością na bodźce emocjonalne",
          "Nasiloną reakcją na bodźce zagrażające i negatywne",
          "Brakiem jakiejkolwiek reakcji emocjonalnej",
          "Wyłącznie poprawą nastroju"
        ],
        correct: 1
      },
      {
        question: "Klasyczne modele depresji podkreślały rolę:",
        answers: [
          "Wyłącznie acetylocholiny",
          "Monoamin (serotoniny, noradrenaliny, dopaminy)",
          "Tylko GABA",
          "Tylko glutaminianu"
        ],
        correct: 1
      },
      {
        question: "Współczesne ujęcia wskazują również na znaczenie:",
        answers: [
          "Neuroplastyczności, czynników neurotroficznych (np. BDNF) i układu glutaminergicznego",
          "Wyłącznie jonów sodu",
          "Tylko podwyższonej temperatury ciała",
          "Wyłącznie układu cholinergicznego"
        ],
        correct: 0
      },
      {
        question: "Przewlekły stres i depresja wiążą się często z dysregulacją osi HPA, co może obejmować:",
        answers: [
          "Obniżone wydzielanie kortyzolu",
          "Podwyższone wydzielanie kortyzolu i zaburzenia rytmu dobowego",
          "Brak jakichkolwiek zmian hormonalnych",
          "Wyłącznie zmiany w insulinie"
        ],
        correct: 1
      },
      {
        question: "Podwyższony poziom kortyzolu może wpływać na mózg m.in. poprzez:",
        answers: [
          "Wspieranie wzrostu neuronów w nieskończoność",
          "Hamowanie neurogenezy i sprzyjanie atrofii w wrażliwych strukturach (np. hipokampie)",
          "Brak jakiegokolwiek wpływu",
          "Zwiększanie objętości wszystkich struktur"
        ],
        correct: 1
      },
      {
        question: "Część badań sugeruje, że skuteczne leczenie depresji (farmako- lub psychoterapia) może:",
        answers: [
          "Nie mieć żadnego wpływu na mózg",
          "Wiązać się z odwróceniem części zmian (np. wzrost objętości hipokampa, normalizacja aktywności sieci)",
          "Zawsze pogarszać stan mózgu",
          "Zawsze zmniejszać objętość kory"
        ],
        correct: 1
      },
      {
        question: "Leki przeciwdepresyjne mogą wpływać m.in. na:",
        answers: [
          "Zwiększenie poziomu monoamin i ekspresję czynników neurotroficznych",
          "Tylko na kolor włosów",
          "Wyłącznie na masę mięśniową",
          "Nie mają żadnego wpływu na neurochemię"
        ],
        correct: 0
      },
      {
        question: "Deficyty funkcji wykonawczych i pamięci w depresji mogą być powiązane z:",
        answers: [
          "Zwiększoną objętością kory przedczołowej",
          "Zmniejszoną aktywnością i objętością kory przedczołowej oraz hipokampa",
          "Wyłącznie z układem obwodowym",
          "Brakiem jakiegokolwiek związku z mózgiem"
        ],
        correct: 1
      },
      {
        question: "Nasilona ruminacja i trudności z przerwaniem negatywnych myśli mogą być związane z:",
        answers: [
          "Wyłącznie móżdżkiem",
          "Zmienami w sieci domyślnej i przedczołowych sieciach kontroli",
          "Brakiem zmian w sieciach",
          "Tylko z płatem potylicznym"
        ],
        correct: 1
      },
      {
        question: "W depresji nawracającej i przewlekłej zmiany strukturalne:",
        answers: [
          "Nigdy nie ulegają progresji",
          "Mogą nasilać się wraz z liczbą epizodów i czasem trwania choroby",
          "Zawsze znikają po pierwszym epizodzie",
          "Dotyczą tylko móżdżku"
        ],
        correct: 1
      },
      {
        question: "Zmiany w mózgu w depresji należy interpretować jako:",
        answers: [
          "Wyłącznie przyczynę choroby",
          "Zarówno potencjalne czynniki predysponujące, jak i konsekwencje przewlekłego stresu i epizodów depresyjnych",
          "Tylko artefakt obrazowania",
          "Tylko skutek działania leków"
        ],
        correct: 1
      },
      {
        question: "Które z poniższych stwierdzeń jest PRAWIDŁOWE?",
        answers: [
          "Wszystkie osoby z depresją mają identyczne zmiany mózgowe",
          "Zmiany są heterogeniczne i stwierdzane statystycznie na poziomie grupy, nie jako jednoznaczny marker indywidualny",
          "Zmiany są tak duże, że widać je gołym okiem",
          "Depresja nie ma żadnego związku z mózgiem"
        ],
        correct: 1
      },
      {
        question: "Które z poniższych stwierdzeń jest FAŁSZYWE?",
        answers: [
          "Hipokamp może mieć zmniejszoną objętość u części pacjentów",
          "Przewlekły stres może wpływać na struktury mózgu",
          "Zmiany strukturalne i funkcjonalne są identyczne u wszystkich pacjentów i stanowią prosty marker diagnostyczny",
          "Leczenie może częściowo normalizować aktywność sieci mózgowych"
        ],
        correct: 2
      }
    ];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    const questionsForRender = questions.map(q => {
      const indices = [0, 1, 2, 3];
      shuffle(indices);
      const shuffledAnswers = indices.map(i => q.answers[i]);
      const newCorrectIndex = indices.indexOf(q.correct);
      return {
        question: q.question,
        answers: shuffledAnswers,
        correct: newCorrectIndex
      };
    });

    const container = document.getElementById("questionsContainer");

    questionsForRender.forEach((q, idx) => {
      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const title = document.createElement("div");
      title.className = "question-title";
      title.textContent = (idx + 1) + ". " + q.question;
      qDiv.appendChild(title);

      const answersDiv = document.createElement("div");
      answersDiv.className = "answers";

      q.answers.forEach((answerText, aIdx) => {
        const label = document.createElement("label");

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `q${idx}`;
        radio.value = aIdx;

        const textSpan = document.createElement("span");
        textSpan.textContent = answerText;

        label.appendChild(radio);
        label.appendChild(textSpan);
        answersDiv.appendChild(label);
      });

      qDiv.appendChild(answersDiv);
      container.appendChild(qDiv);
    });

    const form = document.getElementById("quizForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      let correctCount = 0;

      questionsForRender.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        if (!selected) return;
        const answerIndex = parseInt(selected.value, 10);
        if (answerIndex === q.correct) {
          correctCount++;
        }
      });

      const total = questionsForRender.length;
      const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      resultDiv.textContent = `Masz ${correctCount} / ${total} poprawnych odpowiedzi (${percent}%).`;
    });
  </script>
</body>
</html>

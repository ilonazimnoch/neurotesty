<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Zagadnienie 6 — Potencjały i przewodzenie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }
    p {
      margin-top: 0;
      line-height: 1.6;
    }
    .question {
      margin-bottom: 24px;
      padding: 16px 20px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .question-title {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .answers {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background-color 0.15s ease;
    }
    label:hover {
      background-color: #e5f3ef;
    }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #0f766e;
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(15, 118, 110, 0.35);
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    .submit-btn:hover {
      background-color: #115e59;
      box-shadow: 0 12px 28px rgba(17, 94, 89, 0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Zagadnienie 6 — Potencjał spoczynkowy, potencjał czynnościowy i potencjały postsynaptyczne</h1>
      <p>Test jednokrotnego wyboru. Na końcu zobaczysz liczbę poprawnych odpowiedzi i wynik procentowy.</p>
      <p>Odpowiedzi są pomieszane względem kolejności w pliku źródłowym.</p>
    </div>

    <form id="quizForm" class="card">
      <div id="questionsContainer"></div>

      <button type="submit" class="submit-btn">Zakończ test</button>
      <div id="result" class="result"></div>
    </form>
  </div>

  <script>
    const questions = [
      {
        question: "Potencjał spoczynkowy neuronu to:",
        answers: [
          "Różnica ładunków elektrycznych między wnętrzem a otoczeniem komórki w stanie niepobudzonym",
          "Napięcie powstające tylko podczas potencjału czynnościowego",
          "Różnica stężenia jonów sodu po obu stronach błony przy braku jonów potasu",
          "Stan, w którym wewnątrz neuronu panuje ładunek dodatni względem zewnątrz"
        ],
        correct: 0 // A
      },
      {
        question: "Wartość potencjału spoczynkowego większości neuronów wynosi około:",
        answers: [
          "+30 mV",
          "0 mV",
          "-70 mV",
          "-10 mV"
        ],
        correct: 2 // C
      },
      {
        question: "Potencjał spoczynkowy zależy przede wszystkim od:",
        answers: [
          "Jednorodnego rozkładu jonów po obu stronach błony",
          "Selektywnej przepuszczalności błony i działania pompy sodowo-potasowej",
          "Obecności mieliny na aksonie",
          "Liczby synaps chemicznych"
        ],
        correct: 1 // B
      },
      {
        question: "Który jon ma największy wpływ na potencjał spoczynkowy neuronu?",
        answers: [
          "Jon wapniowy (Ca2+)",
          "Jon chlorkowy (Cl−)",
          "Jon sodowy (Na+)",
          "Jon potasowy (K+)"
        ],
        correct: 3 // D
      },
      {
        question: "Pompa sodowo-potasowa (Na+/K+) w neuronie:",
        answers: [
          "Wprowadza do wnętrza komórki 3 jony Na+ i usuwa 2 jony K+",
          "Usuwa z komórki 3 jony Na+ i wprowadza 2 jony K+",
          "Transportuje po równo Na+ i K+",
          "Transportuje tylko jony K+"
        ],
        correct: 1 // B
      },
      {
        question: "Depolaryzacja błony neuronu oznacza, że:",
        answers: [
          "Wnętrze komórki staje się bardziej ujemne względem zewnątrz",
          "Wnętrze komórki staje się mniej ujemne (bardziej dodatnie) względem zewnątrz",
          "Potencjał błonowy nie ulega zmianie",
          "Następuje powrót do potencjału spoczynkowego"
        ],
        correct: 1 // B
      },
      {
        question: "Hiperpolaryzacja błony neuronu to:",
        answers: [
          "Zmiana potencjału w kierunku bardziej dodatnim niż spoczynkowy",
          "Zmiana potencjału w kierunku bardziej ujemnym niż spoczynkowy",
          "Stan równowagi jonowej bez różnicy potencjału",
          "Stan potencjału czynnościowego"
        ],
        correct: 1 // B
      },
      {
        question: "Potencjał czynnościowy jest zjawiskiem typu:",
        answers: [
          "Stopniowalnego – im większy bodziec, tym większa amplituda",
          "Wszystko albo nic – po przekroczeniu progu ma stałą amplitudę",
          "Stałym – niezależnym od progu pobudliwości",
          "Subprogowym – nigdy nie przekracza -40 mV"
        ],
        correct: 1 // B
      },
      {
        question: "Próg wyzwolenia potencjału czynnościowego wynosi zazwyczaj około:",
        answers: [
          "-90 mV",
          "-70 mV",
          "-55 mV",
          "0 mV"
        ],
        correct: 2 // C
      },
      {
        question: "Które kanały jonowe otwierają się jako pierwsze podczas fazy narastania potencjału czynnościowego?",
        answers: [
          "Napięciozależne kanały sodowe (Na+)",
          "Napięciozależne kanały potasowe (K+)",
          "Kanały chlorkowe (Cl−)",
          "Kanały wapniowe (Ca2+)"
        ],
        correct: 0 // A
      },
      {
        question: "Faza repolaryzacji potencjału czynnościowego wynika głównie z:",
        answers: [
          "Napływu jonów Na+ do komórki",
          "Wypływu jonów K+ z komórki",
          "Wypływu jonów Cl− z komórki",
          "Napływu jonów Ca2+"
        ],
        correct: 1 // B
      },
      {
        question: "Nadstrzał (overshoot) potencjału czynnościowego polega na:",
        answers: [
          "Przekroczeniu potencjału spoczynkowego w kierunku bardziej ujemnym",
          "Przejściowym dodatnim potencjale wewnątrz komórki względem zewnątrz (np. +30 mV)",
          "Braku zmian w potencjale błonowym",
          "Długotrwałej hiperpolaryzacji"
        ],
        correct: 1 // B
      },
      {
        question: "Bezwzględny okres refrakcji to czas, gdy:",
        answers: [
          "Na neuron działa bodziec ponadmaksymalny",
          "Neuron może odpowiedzieć tylko na bardzo silny bodziec",
          "Neuron nie może wygenerować nowego potencjału czynnościowego niezależnie od siły bodźca",
          "Potencjał spoczynkowy jest przywracany przez pompę Na+/K+"
        ],
        correct: 2 // C
      },
      {
        question: "Względny okres refrakcji to czas, gdy:",
        answers: [
          "Nie można wywołać żadnej odpowiedzi",
          "Można wywołać potencjał czynnościowy, ale wymaga to silniejszego bodźca",
          "Komórka jest w pełnym spoczynku",
          "Neuron nie przewodzi impulsów"
        ],
        correct: 1 // B
      },
      {
        question: "W neuronach zmielinizowanych potencjał czynnościowy przewodzi się:",
        answers: [
          "Skokowo, od jednego przewężenia Ranviera do następnego",
          "Jedynie w dendrytach",
          "Tylko w somie",
          "Wyłącznie w zakończeniach synaptycznych"
        ],
        correct: 0 // A
      },
      {
        question: "Zwiększenie średnicy aksonu wpływa na przewodzenie impulsu nerwowego poprzez:",
        answers: [
          "Zmniejszenie prędkości przewodzenia",
          "Brak wpływu na prędkość",
          "Zwiększenie prędkości przewodzenia",
          "Zatrzymanie przewodzenia"
        ],
        correct: 2 // C
      },
      {
        question: "Pobudzający potencjał postsynaptyczny (EPSP) to lokalna zmiana potencjału błonowego, która:",
        answers: [
          "Hiperpolaryzuje błonę i oddala ją od progu",
          "Depolaryzuje błonę i przybliża ją do progu",
          "Nie zmienia napięcia błony",
          "Wywołuje od razu potencjał czynnościowy"
        ],
        correct: 1 // B
      },
      {
        question: "Hamujący potencjał postsynaptyczny (IPSP) zazwyczaj powstaje w wyniku:",
        answers: [
          "Napływu jonów Na+ do komórki",
          "Wypływu jonów K+ lub napływu jonów Cl−",
          "Napływu jonów Ca2+",
          "Zamknięcia wszystkich kanałów jonowych"
        ],
        correct: 1 // B
      },
      {
        question: "Potencjały postsynaptyczne (EPSP i IPSP) mają charakter:",
        answers: [
          "Wszystko albo nic",
          "Stopniowalny (zależny od siły bodźca)",
          "Stały – zawsze ta sama amplituda",
          "Nieelektryczny"
        ],
        correct: 1 // B
      },
      {
        question: "Typowa amplituda pojedynczego EPSP wynosi:",
        answers: [
          "Około 100 mV",
          "Od mniej niż 1 mV do ponad 20 mV",
          "Zawsze 10 mV",
          "Około -70 mV"
        ],
        correct: 1 // B
      },
      {
        question: "Sumowanie przestrzenne (spatial summation) polega na:",
        answers: [
          "Sumowaniu potencjałów z jednego synapsu w krótkim czasie",
          "Sumowaniu potencjałów pochodzących z różnych miejsc na neuronie",
          "Sumowaniu potencjałów tylko w aksonie",
          "Sumowaniu IPSP wyłącznie w przewężeniach Ranviera"
        ],
        correct: 1 // B
      },
      {
        question: "Sumowanie czasowe (temporal summation) oznacza, że:",
        answers: [
          "Potencjały pochodzą z różnych neuronów w tym samym czasie",
          "Pojedyncza synapsa aktywuje się wielokrotnie w krótkich odstępach czasu, a jej potencjały się nakładają",
          "Sumują się wyłącznie IPSP w różnych synapsach",
          "Zawsze dochodzi do wygenerowania potencjału czynnościowego"
        ],
        correct: 1 // B
      }
    ];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    const questionsForRender = questions.map(q => {
      const indices = [0, 1, 2, 3];
      shuffle(indices);
      const shuffledAnswers = indices.map(i => q.answers[i]);
      const newCorrectIndex = indices.indexOf(q.correct);
      return {
        question: q.question,
        answers: shuffledAnswers,
        correct: newCorrectIndex
      };
    });

    const container = document.getElementById("questionsContainer");

    questionsForRender.forEach((q, idx) => {
      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const title = document.createElement("div");
      title.className = "question-title";
      title.textContent = (idx + 1) + ". " + q.question;
      qDiv.appendChild(title);

      const answersDiv = document.createElement("div");
      answersDiv.className = "answers";

      q.answers.forEach((answerText, aIdx) => {
        const id = `q${idx}_a${aIdx}`;

        const label = document.createElement("label");

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `q${idx}`;
        radio.value = aIdx;
        radio.id = id;

        const textSpan = document.createElement("span");
        textSpan.textContent = answerText;

        label.appendChild(radio);
        label.appendChild(textSpan);

        answersDiv.appendChild(label);
      });

      qDiv.appendChild(answersDiv);
      container.appendChild(qDiv);
    });

    const form = document.getElementById("quizForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      let correctCount = 0;

      questionsForRender.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        if (!selected) return;
        const answerIndex = parseInt(selected.value, 10);
        if (answerIndex === q.correct) {
          correctCount++;
        }
      });

      const total = questionsForRender.length;
      const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      resultDiv.textContent = `Masz ${correctCount} / ${total} poprawnych odpowiedzi (${percent}%).`;
    });
  </script>
</body>
</html>

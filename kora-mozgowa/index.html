<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Zagadnienie 25 — Kora mózgowa (płaty mózgowe i kora przedczołowa)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }
    p {
      margin-top: 0;
      line-height: 1.6;
    }
    .question {
      margin-bottom: 24px;
      padding: 16px 20px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .question-title {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .answers {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background-color 0.15s ease;
    }
    label:hover {
      background-color: #e5f3ef;
    }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      padding: 12px 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #0f766e;
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(15, 118, 110, 0.35);
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    .submit-btn:hover {
      background-color: #115e59;
      box-shadow: 0 12px 28px rgba(17, 94, 89, 0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Zagadnienie 25 — Kora mózgowa (płaty mózgowe i kora przedczołowa)</h1>
      <p>Test jednokrotnego wyboru. Na końcu zobaczysz liczbę poprawnych odpowiedzi i wynik procentowy.</p>
      <p>Odpowiedzi są pomieszane względem kolejności w pliku źródłowym.</p>
    </div>

    <form id="quizForm" class="card">
      <div id="questionsContainer"></div>

      <button type="submit" class="submit-btn">Zakończ test</button>
      <div id="result" class="result"></div>
    </form>
  </div>

  <script>
    const questions = [
      {
        question: "Kora mózgowa (cortex cerebri) to:",
        answers: [
          "Warstwa istoty szarej pokrywająca powierzchnię półkul mózgowych",
          "Wyłącznie istota biała półkul mózgowych",
          "Rdzeń kręgowy",
          "Tylko pień mózgu"
        ],
        correct: 0
      },
      {
        question: "Klasyczny podział kory mózgowej na płaty opiera się na:",
        answers: [
          "Podziale histologicznym",
          "Położeniu względem kości czaszki i bruzd (czołowy, ciemieniowy, skroniowy, potyliczny)",
          "Tylko gęstości neuronów",
          "Wyłącznie funkcjach ruchowych"
        ],
        correct: 1
      },
      {
        question: "Płat czołowy położony jest:",
        answers: [
          "Za bruzdą ciemieniowo-potyliczną",
          "Przed bruzdą środkową (rolandzką)",
          "Poniżej bruzdy bocznej (Sylwiusza)",
          "W okolicy potylicznej"
        ],
        correct: 1
      },
      {
        question: "Płat potyliczny jest przede wszystkim związany z:",
        answers: [
          "Przetwarzaniem bodźców słuchowych",
          "Przetwarzaniem bodźców wzrokowych",
          "Planowaniem ruchu",
          "Regulacją emocji"
        ],
        correct: 1
      },
      {
        question: "Pierwszorzędowa kora ruchowa (M1) zlokalizowana jest głównie w:",
        answers: [
          "Zakręcie przedśrodkowym płata czołowego",
          "Zakręcie zaśrodkowym płata ciemieniowego",
          "Zakręcie kątowym",
          "Zakręcie językowatym"
        ],
        correct: 0
      },
      {
        question: "Uszkodzenie pierwszorzędowej kory ruchowej najczęściej prowadzi do:",
        answers: [
          "Ubytku pola widzenia",
          "Niedowładu lub porażenia przeciwstronnych części ciała",
          "Zaburzeń czucia bólu",
          "Wyłącznie zmian osobowości"
        ],
        correct: 1
      },
      {
        question: "Kora przedruchowa i dodatkowa kora ruchowa odpowiadają przede wszystkim za:",
        answers: [
          "Planowanie i przygotowanie sekwencji ruchowych",
          "Wyłącznie wykonanie prostych ruchów",
          "Przetwarzanie bodźców wzrokowych",
          "Regulację temperatury ciała"
        ],
        correct: 0
      },
      {
        question: "Pierwszorzędowa kora somatosensoryczna (S1) zlokalizowana jest głównie w:",
        answers: [
          "Zakręcie przedśrodkowym",
          "Zakręcie zaśrodkowym płata ciemieniowego",
          "Zakręcie nadbrzeżnym",
          "Bruździe ostrogowej"
        ],
        correct: 1
      },
      {
        question: "Uszkodzenia płata ciemieniowego (częściej prawego) mogą prowadzić do:",
        answers: [
          "Anozognozji i zaniedbywania stronnego (neglect)",
          "Utraty wszystkich wspomnień autobiograficznych",
          "Wyłącznie zaburzeń słuchu",
          "Wyłącznie zaburzeń równowagi"
        ],
        correct: 0
      },
      {
        question: "Pierwszorzędowa kora słuchowa zlokalizowana jest głównie w:",
        answers: [
          "Zakrętach Heschla w płacie skroniowym",
          "Bruździe ostrogowej w płacie potylicznym",
          "Zakręcie zaśrodkowym",
          "Zakręcie obręczy"
        ],
        correct: 0
      },
      {
        question: "Zakręt skroniowy górny i środkowy odgrywają ważną rolę w:",
        answers: [
          "Analizie bodźców słuchowych i przetwarzaniu mowy",
          "Wyłącznie kontroli równowagi",
          "Planowaniu ruchu",
          "Regulacji temperatury"
        ],
        correct: 0
      },
      {
        question: "Przyśrodkowe części płata skroniowego (m.in. hipokamp) są kluczowe dla:",
        answers: [
          "Pamięci epizodycznej",
          "Regulacji tętna",
          "Przewodnictwa bólowego",
          "Wyłącznie kontroli ruchu"
        ],
        correct: 0
      },
      {
        question: "Pierwszorzędowa kora wzrokowa (V1) znajduje się głównie w:",
        answers: [
          "Bruździe ostrogowej płata potylicznego",
          "Bruździe bocznej",
          "Zakręcie przedśrodkowym",
          "Zakręcie obręczy"
        ],
        correct: 0
      },
      {
        question: "Uszkodzenie obustronne V1 prowadzi do:",
        answers: [
          "Ślepoty korowej",
          "Utraty słuchu",
          "Utraty czucia bólu",
          "Wyłącznie zaburzeń mowy"
        ],
        correct: 0
      },
      {
        question: "Kora przedczołowa (PFC) to głównie obszary:",
        answers: [
          "Czołowe przed polami ruchowymi, związane z funkcjami wykonawczymi, planowaniem i regulacją zachowania",
          "Tylko korowe reprezentacje mięśni dłoni",
          "Wyłącznie kora wzrokowa",
          "Wyłącznie kora słuchowa"
        ],
        correct: 0
      },
      {
        question: "Grzbietowo-boczna kora przedczołowa wiązana jest głównie z:",
        answers: [
          "Pamięcią roboczą i planowaniem",
          "Regulacją łaknienia",
          "Kontrolą odruchów rdzeniowych",
          "Przetwarzaniem bodźców węchowych"
        ],
        correct: 0
      },
      {
        question: "Brzuszno-przyśrodkowa / oczodołowo-czołowa kora przedczołowa wiązana jest m.in. z:",
        answers: [
          "Abstrakcyjnym rozwiązywaniem problemów matematycznych",
          "Regulacją emocji, oceną wartości nagrody i kary, kontrolą zachowań społecznych",
          "Wyłącznie pamięcią proceduralną",
          "Tylko kontrolą postawy"
        ],
        correct: 1
      },
      {
        question: "Uszkodzenia kory przedczołowej mogą prowadzić do:",
        answers: [
          "Izolowanej utraty czucia bólu",
          "Zaburzeń planowania, impulsywności, zaburzeń kontroli zachowania i osobowości",
          "Wyłącznie ślepoty",
          "Wyłącznie porażeń kończyn"
        ],
        correct: 1
      },
      {
        question: "Klasycznym przykładem zmian po uszkodzeniu PFC jest opis przypadku:",
        answers: [
          "Pacjenta H.M.",
          "Phineasa Gage'a",
          "Pacjenta z ślepotą korową",
          "Pacjenta z afazją Broki"
        ],
        correct: 1
      },
      {
        question: "W lewej półkuli u osób praworęcznych kora przedczołowa częściej angażowana jest w:",
        answers: [
          "Przetwarzanie przestrzenne",
          "Aspekty językowe i analityczne",
          "Wyłącznie regulację równowagi",
          "Tylko funkcje wegetatywne"
        ],
        correct: 1
      },
      {
        question: "W prawej półkuli kora przedczołowa częściej angażowana jest w:",
        answers: [
          "Przetwarzanie prozodii, emocji i informacji przestrzennych",
          "Wyłącznie kontrolę ruchów dłoni",
          "Tylko przetwarzanie mowy",
          "Tylko kontrolę oddychania"
        ],
        correct: 0
      },
      {
        question: "Kora przedczołowa jest kluczowym węzłem takich sieci jak:",
        answers: [
          "Sieć domyślna (DMN), sieci uwagowe i wykonawcze",
          "Tylko sieć wzrokowa",
          "Tylko sieć słuchowa",
          "Sieć odruchów rdzeniowych"
        ],
        correct: 0
      },
      {
        question: "Sieć domyślna (default mode network, DMN) jest szczególnie aktywna podczas:",
        answers: [
          "Intensywnego wykonywania zadań zewnętrznych",
          "Spoczynku, myślenia o sobie, wspominania i wyobrażeń",
          "Wyłącznie snu głębokiego",
          "Napadów padaczkowych"
        ],
        correct: 1
      }
    ];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    const questionsForRender = questions.map(q => {
      const indices = [0, 1, 2, 3];
      shuffle(indices);
      const shuffledAnswers = indices.map(i => q.answers[i]);
      const newCorrectIndex = indices.indexOf(q.correct);
      return {
        question: q.question,
        answers: shuffledAnswers,
        correct: newCorrectIndex
      };
    });

    const container = document.getElementById("questionsContainer");

    questionsForRender.forEach((q, idx) => {
      const qDiv = document.createElement("div");
      qDiv.className = "question";

      const title = document.createElement("div");
      title.className = "question-title";
      title.textContent = (idx + 1) + ". " + q.question;
      qDiv.appendChild(title);

      const answersDiv = document.createElement("div");
      answersDiv.className = "answers";

      q.answers.forEach((answerText, aIdx) => {
        const label = document.createElement("label");

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `q${idx}`;
        radio.value = aIdx;

        const textSpan = document.createElement("span");
        textSpan.textContent = answerText;

        label.appendChild(radio);
        label.appendChild(textSpan);
        answersDiv.appendChild(label);
      });

      qDiv.appendChild(answersDiv);
      container.appendChild(qDiv);
    });

    const form = document.getElementById("quizForm");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      let correctCount = 0;

      questionsForRender.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        if (!selected) return;
        const answerIndex = parseInt(selected.value, 10);
        if (answerIndex === q.correct) {
          correctCount++;
        }
      });

      const total = questionsForRender.length;
      const percent = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      resultDiv.textContent = `Masz ${correctCount} / ${total} poprawnych odpowiedzi (${percent}%).`;
    });
  </script>
</body>
</html>
